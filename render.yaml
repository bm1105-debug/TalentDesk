services:
  # ── Django Backend ──────────────────────────────────────────────────────────
  - type: web
    name: talentdesk-backend
    env: python
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate --no-input && python manage.py fix_ownership && gunicorn config.wsgi --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: talentdesk-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://talentdesk-frontend.onrender.com
      - key: DB_NAME
        fromDatabase:
          name: talentdesk-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: talentdesk-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: talentdesk-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: talentdesk-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: talentdesk-db
          property: port
      - key: GROQ_API_KEY
        sync: false
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false

  # ── React Frontend ──────────────────────────────────────────────────────────
  - type: static
    name: talentdesk-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://talentdesk-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: talentdesk-db
    databaseName: talentdesk
    user: talentdesk
    plan: free
    region: oregon
